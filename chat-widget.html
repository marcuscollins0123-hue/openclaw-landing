<!-- BixiShell Live Chat Widget -->
<script>
(function() {
    // Generate a simple session ID
    function getSessionId() {
        let sid = localStorage.getItem('bixi_chat_session');
        if (!sid) {
            sid = 'bixi_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
            localStorage.setItem('bixi_chat_session', sid);
        }
        return sid;
    }

    const SESSION = getSessionId();
    const API = 'https://api.bixishell.com/api/chat';

    // Inject chat styles
    const style = document.createElement('style');
    style.textContent = `
        #bixi-chat-btn {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, #c0c1ff 0%, #ddb7ff 100%);
            border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(192,193,255,0.4);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s;
        }
        #bixi-chat-btn:hover { transform: scale(1.08); }
        #bixi-chat-btn svg { fill: #1000a9; }
        #bixi-chat-window {
            position: fixed; bottom: 92px; right: 24px; z-index: 9998;
            width: 360px; max-width: calc(100vw - 48px); height: 480px; max-height: calc(100vh - 120px);
            background: rgba(22,22,30,0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            display: none; flex-direction: column; overflow: hidden;
            font-family: 'Hanken Grotesk', sans-serif;
        }
        #bixi-chat-header {
            padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(31,31,39,0.9);
        }
        #bixi-chat-header h3 { margin: 0; font-size: 16px; font-weight: 600; color: #c0c1ff; }
        #bixi-chat-header p { margin: 2px 0 0; font-size: 12px; color: rgba(199,196,215,0.7); }
        #bixi-chat-messages {
            flex: 1; padding: 16px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px;
        }
        .bixi-msg { padding: 8px 14px; border-radius: 12px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .bixi-msg.visitor { align-self: flex-end; background: rgba(128,131,255,0.2); color: #e4e1ed; }
        .bixi-msg.agent { align-self: flex-start; background: rgba(31,31,39,0.8); color: #c7c4d7; border: 1px solid rgba(255,255,255,0.05); }
        .bixi-msg .time { font-size: 10px; color: rgba(199,196,215,0.5); margin-top: 4px; }
        #bixi-chat-input-area {
            padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 8px;
        }
        #bixi-chat-input {
            flex: 1; padding: 10px 14px; border-radius: 24px; border: 1px solid rgba(144,143,160,0.2);
            background: rgba(13,13,21,0.8); color: #e4e1ed; font-size: 14px; outline: none;
        }
        #bixi-chat-input:focus { border-color: #c0c1ff; }
        #bixi-chat-send {
            width: 40px; height: 40px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #c0c1ff 0%, #ddb7ff 100%);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        #bixi-chat-send svg { fill: #1000a9; width: 18px; height: 18px; }
        .bixi-welcome { text-align: center; padding: 20px; color: rgba(199,196,215,0.6); font-size: 13px; }
    `;
    document.head.appendChild(style);

    // Chat button
    const btn = document.createElement('div');
    btn.id = 'bixi-chat-btn';
    btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.88.5 3.65 1.38 5.18L2 22l4.82-1.38C8.35 21.5 10.12 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>';
    document.body.appendChild(btn);

    // Chat window
    const win = document.createElement('div');
    win.id = 'bixi-chat-window';
    win.innerHTML = `
        <div id="bixi-chat-header"><h3>BixiShell Support</h3><p>We typically respond in minutes</p></div>
        <div id="bixi-chat-messages"><div class="bixi-welcome">👋 Hi! Ask us anything about BixiShell.</div></div>
        <div id="bixi-chat-input-area">
            <input id="bixi-chat-input" type="text" placeholder="Type a message...">
            <button id="bixi-chat-send"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
        </div>
    `;
    document.body.appendChild(win);

    // Toggle chat
    btn.onclick = function() {
        const open = win.style.display !== 'none';
        win.style.display = open ? 'none' : 'flex';
        if (!open) document.getElementById('bixi-chat-input').focus();
    };

    // Send message
    async function sendMessage(text) {
        const msgDiv = document.getElementById('bixi-chat-messages');
        msgDiv.innerHTML += '<div class="bixi-msg visitor">' + text + '<div class="time">just now</div></div>';
        msgDiv.scrollTop = msgDiv.scrollHeight;

        try {
            await fetch(API + '/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({session_id: SESSION, message: text})
            });
            // Fetch auto-reply
            const res = await fetch(API + '/messages/' + SESSION);
            const msgs = await res.json();
            const msgDiv2 = document.getElementById('bixi-chat-messages');
            msgDiv2.innerHTML = msgs.map(m => {
                const cls = m.sender === 'visitor' ? 'visitor' : 'agent';
                const time = new Date(m.created_at + 'Z').toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
                return '<div class="bixi-msg ' + cls + '">' + m.message + '<div class="time">' + time + '</div></div>';
            }).join('');
            msgDiv2.scrollTop = msgDiv2.scrollHeight;
        } catch(e) {}
    }

    document.getElementById('bixi-chat-send').onclick = function() {
        const input = document.getElementById('bixi-chat-input');
        const text = input.value.trim();
        if (text) { sendMessage(text); input.value = ''; }
    };
    document.getElementById('bixi-chat-input').onkeydown = function(e) {
        if (e.key === 'Enter') document.getElementById('bixi-chat-send').click();
    };
})();
</script>
<!-- End BixiShell Chat -->
